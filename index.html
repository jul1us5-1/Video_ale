<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para alguien especial</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* Reset básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #ffe6e6 0%, #ffb3c6 100%);
            font-family: 'Poppins', sans-serif;
            color: #333;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Efecto de corazones de fondo */
        #hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .heart {
            position: absolute;
            bottom: -50px;
            font-size: 24px;
            animation: floatUp 5s linear forwards;
            opacity: 0.6;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.8; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }

        /* Cabecera */
        .header {
            text-align: center;
            padding: 50px 20px 30px;
            position: relative;
            z-index: 1;
        }

        .header h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.2rem;
            color: #d6336c;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .header p {
            font-size: 1.1rem;
            color: #6a4c5b;
            font-weight: 300;
        }

        /* Galería y Tarjetas */
        .gallery {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            gap: 40px;
            position: relative;
            z-index: 1;
        }

        .card {
            background: white;
            width: 100%;
            max-width: 350px; 
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(214, 51, 108, 0.2);
            transform: translateY(50px);
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .card.visible {
            transform: translateY(0);
            opacity: 1;
        }

        .media-container {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            background-color: #f8f9fa;
        }

        .media-container video, .media-container img {
            width: 100%;
            display: block;
            object-fit: cover;
            max-height: 450px;
        }

        .message {
            padding: 20px 10px 10px;
            text-align: center;
            font-size: 1.05rem;
            color: #444;
            line-height: 1.5;
        }

        .highlight {
            color: #d6336c;
            font-weight: 600;
        }

        footer {
            text-align: center;
            padding: 50px 20px;
            font-family: 'Dancing Script', cursive;
            font-size: 1.8rem;
            color: #d6336c;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div id="hearts-container"></div>

    <header class="header">
        <h1>Para la negra más linda</h1>
        <p>Un pequeño detalle para alegrar tu día ✨</p>
    </header>

    <main class="gallery">
        
        <div class="card">
            <div class="media-container">
                <video 
                    src="https://github.com/jul1us5-1/Video_ale/raw/refs/heads/main/video_1.mp4" 
                    autoplay 
                    muted 
                    loop 
                    playsinline 
                    style="width: 100%; height: auto; display: block;">
                </video>
            </div>
            <div class="message">
                Que hoy tengas un <span class="highlight">excelente y productivo día</span>. ¡A darle con todo!
            </div>
        </div>

        <div class="card">
            <div class="media-container">
                <video src="https://github.com/jul1us5-1/Video_ale/raw/refs/heads/main/video_2.mp4" autoplay muted loop playsinline style="width: 100%; height: auto; display: block;"></video>
            </div>
            <div class="message">
                Sigue adelante, que nada te detenga. <br> 
                <strong>Tu energía es de otro planeta.</strong> 🚀
            </div>
        </div>

        <div class="card">
            <div class="media-container">
                <video src="video_3.mp4" autoplay muted loop playsinline style="width: 100%; height: auto; display: block;"></video>
            </div>
            <div class="message">
                Solo pasaba a recordarte que <span class="highlight">te ves increíble</span> cuando sonríes. 😊
            </div>
        </div>

    </main>

    <footer>
        Con cariño, [Tu Nombre]
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // 1. Animación de las tarjetas al hacer scroll
            const cards = document.querySelectorAll('.card');

            const observerOptions = {
                root: null,
                threshold: 0.15 
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, observerOptions);

            cards.forEach(card => {
                observer.observe(card);
            });

            // 2. Generador de Corazones Flotantes
            const heartsContainer = document.getElementById('hearts-container');
            const heartEmojis = ['❤️', '💖', '✨', '🌸', '🌹'];

            function createHeart() {
                const heart = document.createElement('div');
                heart.classList.add('heart');
                heart.innerText = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
                heart.style.left = Math.random() * 100 + 'vw';
                
                const size = Math.random() * 1.2 + 0.5; 
                heart.style.fontSize = size + 'em';
                
                const duration = Math.random() * 3 + 4;
                heart.style.animationDuration = duration + 's';

                heartsContainer.appendChild(heart);

                setTimeout(() => {
                    heart.remove();
                }, duration * 1000);
            }

            setInterval(createHeart, 600);
        });
    </script>
</body>
</html>
